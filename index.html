<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

(() => {
"use strict";
const uiCv=document.getElementById("ui"), g=uiCv.getContext("2d");
let W=360, H=620, DPR=1, safeTop=0, safeBot=0;
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------- Constantes de juego (idénticas al ABISMO original) ---------- */
const FOCAL=300, CAMBACK=3.0, CAMH=2.29;
let camZ=-CAMBACK;
const R=0.18, SLAB_D=2.8, FOG_DIST=22, VIEW_AHEAD=26;
const BEV_W=0.10, BEV_H=0.13;
const LANE=2.2, HALF=1.05, LEAN_SPEED=3.7;
const baseV=6.0, vRate=0.02, vMax=15, JOY_R=48;
const JV0=2.9, GRAV_HOLD=6.5, GRAV_FALL=13.0, HOLD_MAX=0.34, AIR_FULL=0.70;
const COYOTE=0.22, CRASH_DUR=0.42;

const S={READY:0,RUN:1,FALL:2,OVER:3,CRASH:4};
let state=S.READY, best=0, lastBiome=null;
try{ best=parseInt(localStorage.getItem("abismo2-best"))||0; }catch(e){}
let kL=false,kR=false;
const joy={active:false,id:-1,cx:0,cy:0,val:0};
let jumpHeld=false, jumpId=-1, holdTime=0;
let ctrl="diestro"; try{ ctrl=localStorage.getItem("abismo2-ctrl")||localStorage.getItem("abismo-ctrl")||"diestro"; }catch(e){}
let swipeVal=0, steerPtr=-1, paused=false; const ptrs={};
const jumpFx={x:0,y:0,t:-1};
let crashT=0, crashSeg=null, crashX=0, crashY=0, fallVz=0;
let ballX,ballY,ballZ,vy,jumping,falling,fallT,idleT;
let segs,frontier,lastXc;
let landFx=0, shake=0;

const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const curV=()=>Math.min(vMax, baseV+Math.max(0,ballZ)*vRate);
const mix=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
const rgb=c=>`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
const lum=c=>0.2126*c[0]+0.7152*c[1]+0.0722*c[2];
const col3=c=>new THREE.Color(c[0]/255,c[1]/255,c[2]/255);

/* ---------- Sonido (WebAudio, generado por código) + vibración ---------- */
let actx=null, master=null, muted=false;
function audioResume(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)();
      master=actx.createGain(); master.gain.value=0.9; master.connect(actx.destination);
    }catch(e){ actx=null; } }
  if(actx && actx.state==="suspended") actx.resume();
}
function tone(freq,dur,o){ o=o||{};
  if(!actx || muted) return;
  const t=actx.currentTime+(o.delay||0), osc=actx.createOscillator(), gn=actx.createGain();
  osc.type=o.type||"sine"; osc.frequency.setValueAtTime(freq,t);
  if(o.to) osc.frequency.exponentialRampToValueAtTime(Math.max(1,o.to),t+dur);
  const vol=o.vol||0.2;
  gn.gain.setValueAtTime(0.0001,t);
  gn.gain.exponentialRampToValueAtTime(vol,t+0.012);
  gn.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.connect(gn).connect(master); osc.start(t); osc.stop(t+dur+0.03);
}
function buzz(p){ if(!muted && navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }
function noise(dur,vol,cutoff){ if(!actx||muted) return;
  const t=actx.currentTime, n=Math.max(1,Math.floor(actx.sampleRate*dur)), buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=actx.createBufferSource(); src.buffer=buf;
  const f=actx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=cutoff||1200;
  const gn=actx.createGain(); gn.gain.value=vol||0.3;
  src.connect(f).connect(gn).connect(master); src.start(t); }
const sfxJump =()=>{ tone(360,0.16,{type:"triangle",vol:0.16,to:640}); buzz(10); };
const sfxLand =()=>{ tone(190,0.12,{type:"sine",vol:0.22,to:95}); noise(0.06,0.12,900); buzz(12); };
const sfxCrash=()=>{ noise(0.2,0.5,1500); tone(320,0.5,{type:"sawtooth",vol:0.2,to:70}); tone(190,0.5,{type:"square",vol:0.12,to:48,delay:0.03}); buzz([60,40,80]); };
const sfxScream=()=>{ tone(520,0.1,{type:"sawtooth",vol:0.15,to:760}); tone(760,0.45,{type:"sawtooth",vol:0.16,to:240,delay:0.09}); buzz([25,25]); };
const sfxFall =()=>{ tone(760,0.5,{type:"sine",vol:0.16,to:150}); buzz([20,30]); };
const sfxOver =()=>{ tone(200,0.5,{type:"sine",vol:0.18,to:110,delay:0.05}); };
const sfxBiome=()=>{ tone(520,0.14,{type:"sine",vol:0.14}); tone(780,0.18,{type:"sine",vol:0.12,delay:0.12}); buzz(8); };
const muteBtn=document.getElementById("mute");
function setMuted(m){ muted=m; muteBtn.textContent=muted?"🔇":"🔊";
  muteBtn.setAttribute("aria-label",muted?"Activar sonido":"Silenciar"); }
muteBtn.addEventListener("click",e=>{ e.stopPropagation(); audioResume(); setMuted(!muted); if(!muted) sfxJump(); });

/* ---------- Biomas (mismos colores y progresión que el original) + luz 3D ---------- */
const B=[
  {name:"CIUDAD", bg:"skyline", line:1.0, sky:{c:"sun",x:0.72,y:0.42,r:24,col:[255,250,222]},
   skyTop:[150,200,240], fog:[206,226,240], voidTop:[60,72,92], voidBot:[12,16,26], glow:[250,222,150], top:[98,104,114], side:[66,70,80], decor:[232,234,240],
   lightPos:[7,11,-5], lightCol:[255,248,230], lightInt:1.15, hemiInt:0.38, fogFar:30},
  {name:"PRADERA", bg:"hills", line:0, sky:{c:"sun",x:0.70,y:0.66,r:32,col:[255,214,150]},
   skyTop:[248,208,152], fog:[250,226,188], voidTop:[74,64,48], voidBot:[16,13,9], glow:[250,200,132], top:[182,150,102], side:[140,110,74], decor:[142,180,96],
   lightPos:[6,7,-3], lightCol:[255,214,150], lightInt:1.05, hemiInt:0.35, fogFar:30},
  {name:"MONTAÑAS", bg:"mtns", line:0.0, sky:{c:"sun",x:0.68,y:0.82,r:30,col:[240,158,112]},
   skyTop:[150,120,150], fog:[186,156,158], voidTop:[54,50,64], voidBot:[12,10,16], glow:[224,150,120], top:[112,120,110], side:[78,86,82], decor:[132,140,122],
   lightPos:[6,4,-2], lightCol:[255,170,120], lightInt:0.95, hemiInt:0.32, fogFar:26},
  {name:"MONTAÑA NEVADA", bg:"peaks", line:0.0, sky:{c:"moon",x:0.74,y:0.34,r:19,col:[224,234,246]},
   skyTop:[70,86,120], fog:[122,142,176], voidTop:[48,60,86], voidBot:[8,12,22], glow:[150,190,235], top:[226,236,246], side:[172,192,212], decor:[240,248,252],
   lightPos:[7,9,-4], lightCol:[180,205,255], lightInt:0.7, hemiInt:0.3, fogFar:24},
  {name:"CUEVA", bg:"cave", line:0.0, sky:{c:"none"},
   skyTop:[26,20,38], fog:[60,52,76], voidTop:[44,34,60], voidBot:[6,4,12], glow:[156,92,214], top:[112,100,130], side:[76,68,98], decor:[94,84,116],
   lightPos:[2,9,1], lightCol:[190,150,255], lightInt:0.45, hemiInt:0.5, fogFar:18},
  {name:"VOLCÁNICA", bg:"volcano", line:0.0, sky:{c:"none"},
   skyTop:[34,12,10], fog:[92,42,28], voidTop:[110,46,24], voidBot:[26,8,4], glow:[255,120,40], top:[92,74,68], side:[60,48,44], decor:[188,72,30],
   lightPos:[1,7,-3], lightCol:[255,150,90], lightInt:0.5, hemiInt:0.5, fogFar:20},
];
const PER=80, BLEND=26;
function palette(m){
  const idx=Math.floor(m/PER), local=m-idx*PER;
  const b0=B[((idx%B.length)+B.length)%B.length], b1=B[(((idx+1)%B.length)+B.length)%B.length];
  let t= local>PER-BLEND ? (local-(PER-BLEND))/BLEND : 0; t=clamp(t,0,1);
  const P={}; for(const k of ["skyTop","fog","voidTop","voidBot","glow","top","side","decor","lightPos","lightCol"]) P[k]=mix(b0[k],b1[k],t);
  for(const k of ["lightInt","hemiInt","fogFar"]) P[k]=b0[k]*(1-t)+b1[k]*t;
  P.name=t>0.5?b1.name:b0.name; P.t=t; P.b0=b0; P.b1=b1;
  P.line=(b0.line||0)*(1-t)+(b1.line||0)*t;
  return P;
}
const bgWeight=(pal,type)=>(pal.b0.bg===type?1-pal.t:0)+(pal.b1.bg===type?pal.t:0);
const nameWeight=(pal,nm)=>(pal.b0.name===nm?1-pal.t:0)+(pal.b1.name===nm?pal.t:0);
const PROP=["farola","arbol","pino","pino_nieve","cristal","roca"];
const biomeIdxAt=z=>((Math.floor(Math.max(0,z)/PER)%B.length)+B.length)%B.length;
function makeProps(z0,z1,xc){
  const type=PROP[biomeIdxAt(z0)], list=[], n=1+Math.floor(Math.random()*2.6);
  for(let k=0;k<n;k++){ const side=Math.random()<0.5?-1:1;
    list.push({type, x:xc+side*(HALF-0.12), z:rand(z0+0.4,z1-0.4), s:rand(0.82,1.18)}); }
  return list;
}

/* ---------- Lógica de juego (idéntica al original) ---------- */
function genAhead(){
  while(frontier<ballZ+VIEW_AHEAD){
    const v=curV(), fullReach=v*AIR_FULL;
    const gap=Math.min(4.8, rand(1.3, Math.max(1.7, 0.82*fullReach)));
    const z0=frontier+gap, L=rand(3.4,6.2), z1=z0+L;
    const dm=1.9*clamp(6/v,0.55,1), xc=clamp(lastXc+rand(-dm,dm),-LANE,LANE);
    const s={z0,z1,xc,half:HALF,props:makeProps(z0,z1,xc)};
    segs.push(s); buildSegment(s); frontier=z1; lastXc=xc;
  }
}
const segAt=z=>{ for(const s of segs) if(z>=s.z0&&z<=s.z1) return s; return null; };
function clearSegs(){ if(segs) for(const s of segs) disposeSegment(s); }
function reset(){
  clearSegs();
  ballX=0;ballY=0;ballZ=0;vy=0;jumping=false;falling=false;fallT=0;idleT=0;jumpHeld=false;holdTime=0;
  const s0={z0:-2,z1:5,xc:0,half:HALF,props:makeProps(-2,5,0)};
  segs=[s0]; buildSegment(s0); frontier=5; lastXc=0; lastBiome=null; camZ=ballZ-CAMBACK;
  removeCracks(); genAhead();
}
function start(){ reset(); state=S.RUN; last=performance.now(); }
function pressJump(){ if(state===S.RUN && !jumping && !falling){ jumping=true; vy=JV0; holdTime=0; jumpHeld=true; sfxJump(); } }
function startFall(){ state=S.FALL; falling=true; fallT=0; if(vy>-0.2) vy=-0.3; fallVz=curV(); sfxScream(); }
function hitWall(Bs){
  crashSeg=Bs; crashX=clamp(ballX,Bs.xc-Bs.half,Bs.xc+Bs.half); crashY=clamp(ballY,-SLAB_D+0.15,-0.06);
  ballX=crashX; ballZ=Bs.z0; state=S.CRASH; crashT=0; shake=0.5; spawnCracks(); burst(crashX,crashY,Bs.z0-0.1,14); sfxCrash();
}
function toOver(){ best=Math.max(best,Math.floor(ballZ)); try{ localStorage.setItem("abismo2-best",best); }catch(e){} state=S.OVER; sfxOver(); }
function leanInput(){ let v = ctrl==="desliz" ? swipeVal : (joy.active?joy.val:0); v+=(kR?1:0)-(kL?1:0); return clamp(v,-1,1); }

function update(dt){
  idleT+=dt; if(landFx>0) landFx-=dt; if(shake>0) shake=Math.max(0,shake-dt*1.8);
  if(state===S.RUN){
    const v=curV(); ballZ+=v*dt;
    ballX=clamp(ballX+leanInput()*LEAN_SPEED*dt, -(LANE+1.5), (LANE+1.5));
    if(jumping){
      holdTime+=dt;
      const grav=(jumpHeld && vy>0 && holdTime<HOLD_MAX) ? GRAV_HOLD : GRAV_FALL;
      ballY+=vy*dt; vy-=grav*dt;
      if(ballY<=0){ const s=segAt(ballZ);
        if(s && Math.abs(ballX-s.xc)<=s.half){ ballY=0; vy=0; jumping=false; landFx=0.16; burst(ballX,0.02,ballZ,8); sfxLand(); }
        else { jumping=false; startFall(); }
      }
    }
    camZ=ballZ-CAMBACK; genAhead();
    segs=segs.filter(s=>{ if(s.z1>camZ-1) return true; disposeSegment(s); return false; });
    if(state===S.RUN && !jumping){ const s=segAt(ballZ);
      if(s){ if(Math.abs(ballX-s.xc)>s.half-0.14) startFall(); }
      else { const p=segAt(ballZ-COYOTE); if(!p||Math.abs(ballX-p.xc)>p.half-0.14) startFall(); } }
  } else if(state===S.FALL){
    ballZ+=fallVz*dt; vy-=GRAV_FALL*dt; ballY+=vy*dt; fallT+=dt; camZ=ballZ-CAMBACK;
    const Bs=segAt(ballZ);
    if(Bs && ballY<0 && ballY>-SLAB_D && Math.abs(ballX-Bs.xc)<=Bs.half){ hitWall(Bs); }
    else if(ballY<-5 || fallT>1.6){ sfxFall(); toOver(); }
  } else if(state===S.CRASH){
    crashT+=dt; camZ=ballZ-CAMBACK;
    if(crashT>0.16){ vy-=GRAV_FALL*dt; ballY+=vy*dt; }
    if(crashT>CRASH_DUR+0.4 || ballY<-SLAB_D-1){ toOver(); }
  } else if(state===S.READY){ ballX=0; ballY=reduce?0:Math.abs(Math.sin(idleT*1.3))*0.07; }
}

function canvasTex(w,h,draw){ const c=document.createElement("canvas"); c.width=w; c.height=h;
  draw(c.getContext("2d"),w,h); const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
function noisify(x,w,h,base,spots,n,rmin,rmax,alpha){
  for(let i=0;i<n;i++){ const c=spots[Math.floor(Math.random()*spots.length)];
    x.fillStyle=rgba(c,alpha*(0.4+Math.random()*0.6));
    x.beginPath(); x.arc(Math.random()*w,Math.random()*h,rmin+Math.random()*(rmax-rmin),0,7); x.fill(); }
}
/* Textura superior por bioma (asfalto, tierra, roca, nieve, cueva, volcán) */
function topTexture(bi){
  const b=B[bi];
  return canvasTex(256,256,(x,w,h)=>{
    x.fillStyle=rgb(b.top); x.fillRect(0,0,w,h);
    const dk=mix(b.top,[0,0,0],0.22), lt=mix(b.top,[255,255,255],0.14);
    noisify(x,w,h,b.top,[dk,lt],420,0.6,2.4,0.5);
    noisify(x,w,h,b.top,[mix(b.decor,b.top,0.45)],60,0.8,3.2,0.55);
    if(bi===0){ // CIUDAD: línea discontinua central de carretera
      x.fillStyle="rgba(255,255,255,0.85)";
      for(let y=8;y<h;y+=64) x.fillRect(w/2-5,y,10,30);
      x.strokeStyle=rgba(dk,0.8); x.lineWidth=2;   // juntas del asfalto
      for(let y=0;y<h;y+=85){ x.beginPath(); x.moveTo(0,y); x.lineTo(w,y); x.stroke(); }
    }
    if(bi===3){ // NIEVE: brillo cristalino
      noisify(x,w,h,b.top,[[255,255,255]],140,0.4,1.1,0.8);
    }
    if(bi===5){ // VOLCÁN: vetas de lava
      x.strokeStyle="rgba(255,120,40,0.55)"; x.lineWidth=2; x.lineCap="round";
      for(let i=0;i<7;i++){ x.beginPath(); let px=Math.random()*w, py=Math.random()*h; x.moveTo(px,py);
        for(let s=0;s<4;s++){ px+=rand(-28,28); py+=rand(-28,28); x.lineTo(px,py); } x.stroke(); }
    }
  });
}

/* ---------- Geometría de losas con borde ondulado (como el original) ---------- */
function buildSegment(s){
  const grp=new THREE.Group();
  const n=Math.max(4, Math.round((s.z1-s.z0)/0.55));
  const hw=z=>s.half+0.16*(0.5+0.5*Math.sin(z*1.9+s.z0));
  // --- superficie superior + biseles
  const pos=[], uv=[], idx=[];
  for(let i=0;i<=n;i++){
    const z=s.z0+(s.z1-s.z0)*(i/n), b=hw(z), xl=s.xc-b, xr=s.xc+b;
    pos.push(xl,-BEV_H,z,  xl+BEV_W,0,z,  xr-BEV_W,0,z,  xr,-BEV_H,z);
    const v=z*0.55;
    uv.push(0,v, 0.06,v, 0.94,v, 1,v);
  }
  for(let i=0;i<n;i++){ const r0=i*4, r1=(i+1)*4;
    for(let q=0;q<3;q++){ const a=r0+q,bq=r0+q+1,c=r1+q+1,d=r1+q;
      idx.push(a,bq,c, a,c,d); } }
  const gt=new THREE.BufferGeometry();
  gt.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
  gt.setAttribute("uv",new THREE.Float32BufferAttribute(uv,2));
  gt.setIndex(idx); gt.computeVertexNormals();
  const bi=biomeIdxAt(s.z0);
  const top=new THREE.Mesh(gt, topMats[bi]);
  top.receiveShadow=true; grp.add(top);
  // --- faldones laterales + tapa frontal (se funden al abismo con alpha)
  const p2=[], u2=[], i2=[];
  const pushWall=(x1,z1,x2,z2)=>{ const base=p2.length/3;
    p2.push(x1,-BEV_H,z1, x2,-BEV_H,z2, x2,-SLAB_D,z2, x1,-SLAB_D,z1);
    u2.push(z1*0.4,0, z2*0.4,0, z2*0.4,1, z1*0.4,1);
    i2.push(base,base+1,base+2, base,base+2,base+3);
  };
  for(let i=0;i<n;i++){
    const za=s.z0+(s.z1-s.z0)*(i/n), zb=s.z0+(s.z1-s.z0)*((i+1)/n);
    pushWall(s.xc-hw(za),za, s.xc-hw(zb),zb);
    pushWall(s.xc+hw(za),za, s.xc+hw(zb),zb);
  }
  pushWall(s.xc-hw(s.z0),s.z0, s.xc+hw(s.z0),s.z0);   // tapa frontal (la pared del choque)
  const gs=new THREE.BufferGeometry();
  gs.setAttribute("position",new THREE.Float32BufferAttribute(p2,3));
  gs.setAttribute("uv",new THREE.Float32BufferAttribute(u2,2));
  gs.setIndex(i2); gs.computeVertexNormals();
  const side=new THREE.Mesh(gs, sideMats[bi]); grp.add(side);
  // --- props 3D en los bordes
  if(s.props) for(const pr of s.props){
    const m=propTemplates[pr.type].clone();
    m.position.set(pr.x,0,pr.z); m.scale.setScalar(pr.s);
    m.rotation.y=rand(0,6.28); grp.add(m);
  }
  s.mesh=grp; scene.add(grp);
}
function disposeSegment(s){
  if(!s.mesh) return;
  s.mesh.traverse(o=>{ if(o.geometry && !o.userData.shared) o.geometry.dispose(); });
  scene.remove(s.mesh); s.mesh=null;
}

/* ---------- Ajuste a pantalla ---------- */
let fovYrad=1.2, pitch=0;
function readSafe(){
  const cs=getComputedStyle(document.documentElement);
  const px=n=>parseFloat(cs.getPropertyValue(n))||0;
  return {t:px('--sat'), b:px('--sab')};
}
function resize(){
  const cssW=Math.max(1,window.innerWidth), cssH=Math.max(1,window.innerHeight);
  DPR=Math.min(window.devicePixelRatio||1, 2);
  W=360; H=Math.round(W*cssH/cssW);
  uiCv.width=Math.round(cssW*DPR); uiCv.height=Math.round(cssH*DPR);
  uiCv.style.width=cssW+"px"; uiCv.style.height=cssH+"px";
  g.setTransform(uiCv.width/W,0,0,uiCv.width/W,0,0);
  const s=readSafe(), k=W/cssW; safeTop=s.t*k; safeBot=s.b*k;
  // cámara: FOV horizontal fijo ≈62° (mismo encuadre que FOCAL=300 sobre 360 px)
  const aspect=cssW/cssH;
  fovYrad=2*Math.atan(Math.tan(0.5410)/aspect);   // 0.541 rad = 31°
  camera.fov=THREE.MathUtils.radToDeg(fovYrad); camera.aspect=aspect;
  pitch=(0.5-0.16)*fovYrad;                        // horizonte al 16% desde arriba
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(DPR);
  renderer.setSize(cssW,cssH,false);
  composer.setSize(cssW*DPR,cssH*DPR);
}

/* ---------- Sincronizar la escena con el estado del juego ---------- */
const camPos=new THREE.Vector3(), camTgt=new THREE.Vector3();
function syncScene(dt,pal){
  // niebla + cielo
  scene.fog.color.copy(col3(pal.fog));
  scene.fog.near=4.5; scene.fog.far=pal.fogFar;
  skyUni.uTop.value.copy(col3(pal.skyTop));
  skyUni.uHorizon.value.copy(col3(pal.fog));
  skyUni.uVoidTop.value.copy(col3(pal.voidTop));
  skyUni.uVoidBot.value.copy(col3(pal.voidBot));
  skyUni.uGlow.value.copy(col3(pal.glow).multiplyScalar(0.42));
  const wVolc=nameWeight(pal,"VOLCÁNICA");
  skyUni.uGlowK.value=0.9+wVolc*(0.15+0.2*Math.abs(Math.sin(idleT*3)));
  // luces
  dirLight.color.copy(col3(pal.lightCol)); dirLight.intensity=pal.lightInt;
  dirLight.position.set(ballX+pal.lightPos[0], pal.lightPos[1], ballZ+pal.lightPos[2]);
  dirLight.target.position.set(ballX, 0, ballZ+4);
  hemi.color.copy(col3(pal.skyTop)); hemi.groundColor.copy(col3(mix(pal.voidTop,pal.glow,0.5)));
  hemi.intensity=pal.hemiInt;
  // siluetas + astros + estrellas
  backdrops.forEach((m,i)=>{ m.material.opacity=bgWeight(pal,B[i].bg); });
  setCelestial(celA,pal.b0.sky,1-pal.t); setCelestial(celB,pal.b1.sky,pal.t);
  stars.material.opacity=nameWeight(pal,"MONTAÑA NEVADA")*0.85;
  // cámara (con temblor en el choque)
  const shx=shake>0?rand(-1,1)*shake*0.05:0, shy=shake>0?rand(-1,1)*shake*0.05:0;
  const cx=ballX*0.3;
  camPos.set(cx+shx, CAMH+shy, ballZ-CAMBACK);
  camera.position.copy(camPos);
  const D=10, ty=CAMH-Math.tan(pitch)*D;
  camTgt.set(cx*0.85, ty, ballZ-CAMBACK+D);
  camera.lookAt(camTgt);
  far.position.set(camera.position.x, 0, camZ);
  // bola: posición + rodadura + squash
  let by=ballY+R, bz=ballZ, sx=1,sy=1,sz=1;
  if(state===S.CRASH){
    const k2=Math.exp(-crashT*10);
    sx=1+0.3*k2; sy=1+0.18*k2; sz=1-0.42*k2;
    bz=crashSeg.z0-R*(1-0.42*k2);
    ball.position.set(crashX, crashY, bz);
  } else {
    if(landFx>0){ const k2=landFx/0.16; sy=1-0.24*k2; sx=sz=1+0.12*k2; }
    ball.position.set(ballX, by, bz);
  }
  ball.scale.set(sx,sy,sz);
  if(state===S.RUN||state===S.READY) ball.rotation.x+= (state===S.RUN?curV():1.2)*dt/R;
  // grietas creciendo
  if(crackMesh){ const grow=clamp(crashT/CRASH_DUR,0,1);
    crackMesh.scale.setScalar(0.2+0.8*grow); }
  stepParticles(dt,pal); stepDust(dt,pal);
}

    g.font='700 '+bs+'px "Helvetica Neue",Arial,sans-serif'; g.fillStyle="rgba(255,255,255,0.95)"; g.fillText(btn,cx,cy+78); }
}

/* ---------- Bucle principal ---------- */
let last=performance.now();
let fpsAcc=0, fpsN=0, fpsT=0, quality=2;
function autoQuality(dt){
  fpsAcc+=1/Math.max(dt,0.001); fpsN++; fpsT+=dt;
  if(fpsT>2.5){ const fps=fpsAcc/fpsN; fpsAcc=0; fpsN=0; fpsT=0;
    if(fps<40 && quality===2){ quality=1; usePost=false; }                       // 1º: fuera bloom
    else if(fps<34 && quality===1){ quality=0; renderer.setPixelRatio(Math.min(DPR,1.3)); } // 2º: menos resolución
  }
}
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(!paused) update(dt);
  const pal=palette(state===S.READY?0:Math.max(0,Math.floor(ballZ)));
  if(state===S.RUN){ if(lastBiome!==null && pal.name!==lastBiome) sfxBiome(); lastBiome=pal.name; }
  if(!paused) syncScene(dt,pal);
  if(usePost) composer.render(); else renderer.render(scene,camera);
  g.clearRect(0,0,W,H);
  if(state!==S.READY) drawHUD(pal);
  drawJoystick();
  if(state===S.READY) cardR("ABISMO 2.0","Izquierda: joystick  ·  Derecha: saltar\n(mantén pulsado = salto más largo)","TOCA PARA EMPEZAR");
  else if(state===S.OVER) cardR("CAÍSTE",Math.floor(ballZ)+" metros · mejor "+best,"TOCA PARA REINTENTAR");
  autoQuality(dt);
  requestAnimationFrame(loop);
}

/* ---------- Entrada (idéntica al original) ---------- */
const toCanvas=e=>{ const r=uiCv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)}; };
const cover=document.getElementById("cover");
function dismissCover(){ if(!cover||cover.classList.contains("hide")) return;
  audioResume(); firstGestureFullscreen(); if(state===S.READY) start();
  cover.classList.add("hide"); setTimeout(()=>{ if(cover) cover.style.display="none"; },600); }
if(cover) cover.addEventListener("pointerdown",e=>{ e.preventDefault(); dismissCover(); });
const gearBtn=document.getElementById("gear"), settings=document.getElementById("settings");
const ctrlBtns=[...document.querySelectorAll("#coverCtrl button, .ctrlopt")];
function updateCtrlUI(){ ctrlBtns.forEach(b=>b.classList.toggle("on", b.dataset.c===ctrl)); }
function setCtrl(c){ ctrl=c; try{ localStorage.setItem("abismo2-ctrl",c); }catch(e){}
  joy.active=false; joy.val=0; swipeVal=0; steerPtr=-1; for(const k in ptrs) delete ptrs[k]; updateCtrlUI(); }
ctrlBtns.forEach(b=> b.addEventListener("pointerdown",e=>{ e.preventDefault(); e.stopPropagation(); audioResume(); setCtrl(b.dataset.c); }));
function openSettings(){ settings.classList.add("show"); if(state===S.RUN) paused=true; }
function closeSettings(){ settings.classList.remove("show"); if(paused){ paused=false; last=performance.now(); } }
gearBtn.addEventListener("pointerdown",e=>{ e.preventDefault(); e.stopPropagation(); audioResume(); openSettings(); });
document.getElementById("settingsClose").addEventListener("pointerdown",e=>{ e.preventDefault(); e.stopPropagation(); closeSettings(); });
settings.addEventListener("pointerdown",e=>{ if(e.target===settings){ e.preventDefault(); closeSettings(); } });
updateCtrlUI();
uiCv.addEventListener("pointerdown",e=>{ e.preventDefault(); audioResume();
  if(state===S.READY||state===S.OVER){ firstGestureFullscreen(); start(); return; }
  if(state===S.CRASH||state===S.FALL){ toOver(); return; }
  if(state!==S.RUN||paused) return; const p=toCanvas(e);
  if(ctrl==="desliz"){ ptrs[e.pointerId]={x0:p.x,y0:p.y,t:idleT,moved:false}; }
  else { const onJoy = (ctrl==="diestro") ? (p.x<W/2) : (p.x>=W/2);
    if(onJoy){ joy.active=true; joy.id=e.pointerId; joy.cx=p.x; joy.cy=p.y; joy.val=0; }
    else { jumpId=e.pointerId; pressJump(); jumpFx.x=p.x; jumpFx.y=p.y; jumpFx.t=idleT; } }
});
uiCv.addEventListener("pointermove",e=>{ const p=toCanvas(e);
  if(ctrl==="desliz"){ const P=ptrs[e.pointerId]; if(P){
    if(Math.abs(p.x-P.x0)>6||Math.abs(p.y-P.y0)>6) P.moved=true;
    if(P.moved){ steerPtr=e.pointerId; swipeVal=clamp((p.x-P.x0)/JOY_R,-1,1); } } }
  else if(joy.active&&e.pointerId===joy.id){ joy.val=clamp((p.x-joy.cx)/JOY_R,-1,1); } });
const onUp=e=>{
  if(ctrl==="desliz"){ const P=ptrs[e.pointerId];
    if(P){ if(!P.moved && (idleT-P.t)<0.3){ pressJump(); jumpFx.x=P.x0; jumpFx.y=P.y0; jumpFx.t=idleT; }
      delete ptrs[e.pointerId]; if(steerPtr===e.pointerId){ steerPtr=-1; swipeVal=0; } } }
  else { if(joy.active&&e.pointerId===joy.id){ joy.active=false; joy.val=0; } if(e.pointerId===jumpId){ jumpHeld=false; jumpId=-1; } }
};
uiCv.addEventListener("pointerup",onUp); uiCv.addEventListener("pointercancel",onUp);
addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft"){kL=true;e.preventDefault();}
  else if(e.key==="ArrowRight"){kR=true;e.preventDefault();}
  else if(e.key===" "||e.key==="ArrowUp"||e.key==="Enter"){ if(!e.repeat){ audioResume(); if(cover && !cover.classList.contains("hide")) dismissCover(); else if(state===S.READY||state===S.OVER) start(); else pressJump(); } e.preventDefault(); }
},{passive:false});
addEventListener("keyup",e=>{ if(e.key==="ArrowLeft")kL=false; else if(e.key==="ArrowRight")kR=false;
  else if(e.key===" "||e.key==="ArrowUp"||e.key==="Enter"){ jumpHeld=false; } });
addEventListener("blur",()=>{kL=false;kR=false;joy.active=false;joy.val=0;jumpHeld=false;});

/* ---------- Pantalla completa (Android/desktop) ---------- */
let fsAsked=false;
function firstGestureFullscreen(){
  if(fsAsked) return; fsAsked=true;
  const el=document.documentElement, rq=el.requestFullscreen||el.webkitRequestFullscreen;
  if(rq){ try{ const p=rq.call(el); if(p&&p.catch) p.catch(()=>{}); }catch(e){} }
}

/* ---------- PWA: service worker (instalable + offline) ---------- */
if("serviceWorker" in navigator){ addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }

addEventListener("resize",resize);
addEventListener("orientationchange",resize);
if(window.visualViewport) visualViewport.addEventListener("resize",resize);
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) last=performance.now(); });

/* ---------- Modo pruebas (#test): saltar a cada bioma sin jugar ---------- */
function jumpTo(m){
  if(cover){ cover.classList.add("hide"); cover.style.display="none"; }
  audioResume(); if(state!==S.RUN) start();
  clearSegs();
  ballZ=m; ballX=0; ballY=0; vy=0; jumping=false; falling=false; fallT=0;
  const s0={z0:ballZ-2,z1:ballZ+6,xc:0,half:HALF,props:makeProps(ballZ-2,ballZ+6,0)};
  segs=[s0]; buildSegment(s0);
  frontier=ballZ+6; lastXc=0; lastBiome=null; camZ=ballZ-CAMBACK; genAhead();
}
if(location.hash==="#test" || location.search.indexOf("test")>=0){
  const bar=document.createElement("div");
  bar.style.cssText="position:fixed;left:6px;right:6px;top:calc(var(--sat) + 96px);z-index:30;display:flex;flex-wrap:wrap;gap:6px;justify-content:center";
  B.forEach((b,i)=>{ const btn=document.createElement("button"); btn.textContent=b.name;
    btn.style.cssText="font:700 10px/1 Arial;padding:7px 8px;border:0;border-radius:8px;background:rgba(18,18,28,.74);color:#fff;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)";
    btn.addEventListener("pointerdown",e=>{ e.preventDefault(); e.stopPropagation(); jumpTo(i*PER+Math.floor(PER/2)); });
    bar.appendChild(btn); });
  document.body.appendChild(bar);
  // ganchos de depuración: avanzar la simulación a mano y leer el estado
  window.__step=s=>{ const n=Math.max(1,Math.ceil(s/0.016)); for(let i=0;i<n;i++) update(0.016); };
  window.__jump=()=>pressJump();
  window.__st=()=>({state,ballX:+ballX.toFixed(2),ballY:+ballY.toFixed(2),ballZ:+ballZ.toFixed(2),segs:segs.length});
}

reset(); resize(); requestAnimationFrame(loop);
})();
</script>
